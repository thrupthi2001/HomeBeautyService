spring.application.name=HomeBeautyService
# ==============================
# Server Configuration
# ==============================
server.port=8084


# ==============================
# Database Configuration (MySQL)
# ==============================
spring.datasource.url=jdbc:mysql://localhost:3306/homebeautyservice
spring.datasource.username=Thrupthi
spring.datasource.password=PremVinu@2002
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================
# JPA / Hibernate Settings
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ==============================
# JSP Configuration
# ==============================
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# ==============================
# File Upload 
# ==============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ==============================
# UTF-8 Encoding (FIX EMOJI ?? ISSUE)
# ==============================
server.tomcat.uri-encoding=UTF-8
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true
